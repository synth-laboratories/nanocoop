track: offline_20min_1xa100_40gb
run_name: smoke_baseline
backend: overcookedv2
benchmark_eligible: false
output_dir: outputs/offline_smoke

model:
  name: smoke-local

teacher_model:
  name: oracle-smoke

policy:
  seed_prompt: |
    You are a cooperative cooking agent.
    Complement your partner.

env:
  train_layouts: [grounded_coord_simple]
  eval_layouts: [test_time_simple]
  train_seeds: [1]
  eval_seeds: [4]
  max_steps: 20
  stochasticity: 0.08

partner_zoo:
  train: [courier]
  eval: [courier]

eval:
  episodes_per_combo: 1
  default_episode_count: 1
  episode_ids: [1]

offline:
  teacher_episodes_per_pair: 1
  min_return_threshold: 0.8
  max_examples_per_signature: 2
  min_votes: 1
