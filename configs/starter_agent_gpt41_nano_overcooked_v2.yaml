track: starter_agent
run_name: gpt41_nano_nochange_baseline
backend: overcookedv2
benchmark_eligible: false
output_dir: records/starter_agent/2026-04-12_gpt41_nano_nochange_baseline

model:
  name: gpt-4.1-nano
  api_base: https://api.openai.com/v1
  temperature: 0.0
  max_tokens: 256
  plan_horizon: 4

policy:
  seed_prompt: |
    You are a cooperative cooking agent.
    Complement your partner.
    Prefer complementary roles.
    Avoid duplicate work.
    Finish the soup.

env:
  eval_layouts:
    - test_time_simple
    - test_time_wide
    - demo_cook_wide
  max_steps: 80
  policy_decision_interval: 8
  stochasticity: 0.12

partner_zoo:
  eval: [courier, potter, handoff, noisy]

eval:
  episode_seed_start: 1
  episodes_per_combo: 4
  default_episode_count: 20
  default_episode_sample_seed: 20260412
  workers: 4
  episode_ids: [1, 3, 4, 5, 6, 8, 10, 12, 13, 14, 19, 21, 24, 26, 30, 33, 36, 39, 44, 47]
