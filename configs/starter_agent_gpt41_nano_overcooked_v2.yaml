# Official starter policy settings. Preserve these values.
model: gpt-4.1-nano
plan_horizon: 4
policy_decision_interval: 8

# Narrow cooperative guardrail improvement.
partner_aware_guardrails: true
cooperation_prompt: "Act as a cooperative Overcooked partner. Keep the shared plan intact, avoid duplicating your partner's job, and choose the smallest safe action that unlocks the next joint step. If the partner is already covering a task, support by clearing space, staging handoff resources, or advancing the next shared step rather than idling or emitting no-op communication."
