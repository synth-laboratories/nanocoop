track: prompt_opt_1usd_gpt54_family
run_name: smoke_baseline
backend: overcookedv2
benchmark_eligible: false
output_dir: outputs/prompt_opt_smoke

model:
  name: smoke-local

optimizer_model:
  family: gpt-5.4
  budget_usd: 0.05

policy:
  seed_prompt: |
    You are a cooperative cooking agent.
    Complement your partner.
    Finish the soup.

env:
  train_layouts: [grounded_coord_simple]
  eval_layouts: [test_time_simple]
  train_seeds: [1]
  eval_seeds: [3]
  max_steps: 20
  stochasticity: 0.08

partner_zoo:
  train: [courier]
  eval: [courier]

eval:
  episodes_per_combo: 1
  default_episode_count: 1
  episode_ids: [1]

prompt_opt:
  max_candidates: 2
  probe_episodes_per_candidate: 1
  clauses:
    - Infer your partner's convention from their first informative action.
    - Avoid duplicate work.
    - Finish the soup before chasing side tasks.
