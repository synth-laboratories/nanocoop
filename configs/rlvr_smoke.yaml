track: rlvr_20min_2xa100_40gb
run_name: smoke_baseline
backend: overcookedv2
benchmark_eligible: false
output_dir: outputs/rlvr_smoke

model:
  name: smoke-local

policy:
  seed_prompt: |
    You are a cooperative cooking agent.
    Complement your partner.

env:
  train_layouts: [grounded_coord_simple]
  eval_layouts: [test_time_simple]
  train_seeds: [1]
  eval_seeds: [4]
  max_steps: 20
  stochasticity: 0.08

partner_zoo:
  train: [courier]
  eval: [courier]

eval:
  episodes_per_combo: 1
  default_episode_count: 1
  episode_ids: [1]

rlvr:
  iterations: 1
  episodes_per_iteration: 2
  exploration_rate: 0.15
  min_improvement_to_keep: 0.0
