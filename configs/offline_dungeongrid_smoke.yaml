track: offline_20min_1xa100_40gb
run_name: dungeongrid_offline_smoke
backend: dungeongrid
benchmark_eligible: false
output_dir: outputs/offline_dungeongrid_smoke

policy:
  seed_prompt: |
    Coordinate the Barbarian, Wizard, Elf, and Dwarf.
    Respect legal dungeon actions and recover the objective.

env:
  train_layouts: [lantern_crypt]
  train_seeds: [1]
  eval_layouts: [lantern_crypt]
  num_heroes: 4
  player_count_mode: squad
  max_steps: 24
  observation_mode: mixed

partner_zoo:
  train: [scripted_warden]
  eval: [scripted_warden]

eval:
  episode_seed_start: 1
  episodes_per_combo: 1
  default_episode_count: 1
  episode_ids: [1]

offline:
  teacher_episodes_per_pair: 1
