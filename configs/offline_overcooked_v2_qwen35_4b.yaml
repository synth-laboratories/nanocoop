track: offline_20min_1xa100_40gb
run_name: overcookedv2_reference_baseline
backend: overcookedv2
benchmark_eligible: false
output_dir: records/offline_20min_1xa100_40gb/2026-04-12_overcookedv2_reference_baseline

model:
  name: Qwen/Qwen3.5-4B
  temperature: 0.0
  max_tokens: 128

teacher_model:
  name: Qwen/Qwen3.5-9B

policy:
  seed_prompt: |
    You are a cooperative cooking agent.
    Share hidden info early.
    Complement your partner.
    Avoid duplicate work.
    Finish the soup.

env:
  train_layouts:
    - grounded_coord_simple
    - grounded_coord_ring
    - demo_cook_simple
  eval_layouts:
    - test_time_simple
    - test_time_wide
    - demo_cook_wide
  train_seeds: [11, 13, 17, 19, 23, 29, 31, 37]
  eval_seeds: [101, 103, 107, 109, 113, 127]
  max_steps: 8
  stochasticity: 0.12

partner_zoo:
  train: [courier, potter, handoff, noisy]
  eval: [courier, potter, handoff, noisy]

offline:
  teacher_episodes_per_pair: 8
  min_return_threshold: 1.2
  max_examples_per_signature: 3
  min_votes: 1
