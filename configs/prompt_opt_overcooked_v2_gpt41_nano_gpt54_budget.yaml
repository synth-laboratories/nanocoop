track: prompt_opt_1usd_gpt54_family
run_name: overcookedv2_gpt41_nano_reference_baseline
backend: overcookedv2
benchmark_eligible: false
output_dir: records/prompt_opt_1usd_gpt54_family/2026-04-12_overcookedv2_gpt41_nano_reference_baseline

model:
  name: gpt-4.1-nano
  api_base: https://api.openai.com/v1
  temperature: 0.0
  max_tokens: 256
  plan_horizon: 4

optimizer_model:
  family: gpt-5.4
  budget_usd: 1.0

policy:
  seed_prompt: |
    You are a cooperative cooking agent.
    Complement your partner.
    Prefer complementary roles.
    Finish the soup.

env:
  train_layouts:
    - grounded_coord_simple
    - grounded_coord_ring
    - demo_cook_simple
  eval_layouts:
    - test_time_simple
    - test_time_wide
    - demo_cook_wide
  train_seeds: [71, 73, 79, 83]
  eval_seeds: [163, 167, 173, 179]
  max_steps: 80
  policy_decision_interval: 8
  stochasticity: 0.12

partner_zoo:
  train: [courier, potter, handoff, noisy]
  eval: [courier, potter, handoff, noisy]

prompt_opt:
  max_candidates: 16
  probe_episodes_per_candidate: 12
  clauses:
    - Infer your partner's convention from their first informative action.
    - Avoid duplicate work.
    - Recover quickly after stochastic failures.
    - Prefer complementary roles over symmetric roles.
    - Finish the soup before chasing side tasks.
